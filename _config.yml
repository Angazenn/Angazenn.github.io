# Site settings
title: My Blog
email: your-email@example.com
description: >-
  A personal blog about technology, code, and whatever else
  catches my attention.
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://angazenn.github.io" # the base hostname & protocol
twitter_username: angazenn
github_username:  angazenn

# Build settings
theme: minima
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate

# Pagination
paginate: 5
paginate_path: "/page/:num/"

# Minima theme settings
minima:
  date_format: "%b %-d, %Y"
  social_links:
    - { platform: github,  user_url: "https://github.com/angazenn" }
    - { platform: twitter, user_url: "https://twitter.com/angazenn" }

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - README.md

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: post
      permalink: /:categories/:year/:month/:day/:title/
  - scope:
      path: ""
    values:
      layout: default
